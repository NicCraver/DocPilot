name: CI

# 日常开发在本地 pre-push 跑 ci:local；此 workflow 仅手动触发，节省 Actions 额度。
on:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i -g @vitejs/plus
      - run: pnpm install
      - run: vp check src packages/shared-types/src/index.ts packages/shared-types/src/tool-ids.ts
      - run: vp test

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: 校验 ts-rs 生成物已提交
        run: git diff --exit-code packages/shared-types/src/generated/

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: npm i -g @vitejs/plus
      - run: pnpm install
      - run: vp build
      - run: npx tauri build
        env:
          CI: true

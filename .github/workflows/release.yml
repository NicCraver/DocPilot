name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: |
          pnpm run test
          cargo test --manifest-path src-tauri/Cargo.toml

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: 安装系统依赖（OCR / 打包）
        run: brew install poppler tesseract dylibbundler python@3.11
      - run: pnpm install --frozen-lockfile
      - name: 构建 Tauri 安装包
        run: pnpm run tauri:build
        env:
          CI: true
      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows-x64:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - name: 构建 Tauri 安装包 (x64)
        run: pnpm run tauri:build
        env:
          CI: true
      - name: 上传 Windows x64 产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-windows-arm64:
    needs: test
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - name: 构建 Tauri 安装包 (ARM64)
        run: pnpm run tauri:build
        env:
          CI: true
      - name: 上传 Windows ARM64 产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows-x64, build-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: 列出安装包
        run: find release-assets -type f \( -name '*.dmg' -o -name '*.exe' \) -exec ls -lh {} \;
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
          generate_release_notes: true
